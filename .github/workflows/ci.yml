name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned)
        run: |
          ZV=$(cat .zigversion)
          curl -sSL "https://ziglang.org/download/${ZV}/zig-x86_64-linux-${ZV}.tar.xz" | tar xJ
          echo "$PWD/zig-x86_64-linux-${ZV}" >> "$GITHUB_PATH"

      - name: Formatting
        run: zig fmt --check src build.zig

      - name: Unit tests
        run: zig build test

      # The fuzz harness runs inside `zig build test` with a fresh seed each
      # invocation, so extra seeds buy extra coverage. A failure prints its
      # seed; replay it with `zig build test --seed 0x...`. Half the seeds run
      # ReleaseSafe because that is what ships.
      - name: Parser fuzzing (untrusted-input surface, 12 seeds)
        run: |
          for i in $(seq 1 12); do
            seed=$(printf '0x%08x' $(( (RANDOM << 16) | RANDOM )))
            mode=""
            [ $((i % 2)) -eq 0 ] && mode="-Doptimize=ReleaseSafe"
            echo "--- fuzz seed $seed $mode"
            zig build test --seed "$seed" $mode
          done

      - name: Integration harness
        run: |
          zig build
          bash test/harness/run_tests.sh

      # Steady-state proof: the README claims zero allocations once running.
      # 3 minutes is enough to catch any real leak (a 1 KB/s drift blows the
      # 256 KB budget in ~4 minutes of soak; the workload runs capture, the
      # sampler, restart churn, incidents, health probes, and metrics at once).
      - name: Soak (steady-state RSS / fd / thread flatness)
        run: SOAK_SECONDS=180 bash test/harness/soak.sh

      - name: Capture perf gate (nanozlog batching must not regress)
        run: |
          start=$(date +%s%N)
          ./zig-out/bin/mandor "sh -c 'seq 200000'" > /dev/null 2>&1
          took_ms=$(( ($(date +%s%N) - start) / 1000000 ))
          echo "200k lines in ${took_ms}ms"
          if [ "$took_ms" -gt 2000 ]; then
            echo "::error::capture perf regression: ${took_ms}ms > 2000ms budget"
            exit 1
          fi

      - name: aarch64 smoke under qemu
        run: |
          # Full unit tests don't survive user-mode emulation (signalfd/fork/
          # procfs semantics differ under qemu-user); prove the arm64 binary
          # executes and supervises a worker end-to-end instead.
          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user
          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSafe -p zig-out/qa64
          qemu-aarch64 zig-out/qa64/bin/mandor --version
          qemu-aarch64 zig-out/qa64/bin/mandor --help | grep -q restart

      - name: Release builds + size gate (< 500 KB)
        run: |
          zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSafe -p zig-out/x64
          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSafe -p zig-out/a64
          for f in zig-out/x64/bin/mandor zig-out/a64/bin/mandor; do
            size=$(stat -c%s "$f")
            echo "$f: ${size} bytes"
            if [ "$size" -ge 512000 ]; then
              echo "::error::size budget exceeded: $f is ${size} bytes (budget 512000)"
              exit 1
            fi
          done

      - name: Upload binary for distro matrix
        uses: actions/upload-artifact@v4
        with:
          name: mandor-x64
          path: zig-out/x64/bin/mandor

  # The binary is libc-free static — prove it runs the full harness on the
  # common container bases, not just the runner's Ubuntu.
  distros:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ["alpine:3.20", "debian:bookworm-slim", "ubuntu:24.04"]
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install harness deps
        run: |
          if command -v apk >/dev/null; then
            apk add --no-cache bash curl coreutils procps
          else
            apt-get update -qq && apt-get install -y -qq bash curl procps
          fi

      - uses: actions/download-artifact@v4
        with:
          name: mandor-x64
          path: zig-out/bin

      - name: Run harness
        run: |
          chmod +x zig-out/bin/mandor
          bash test/harness/run_tests.sh 2>&1 | tee /tmp/harness.log || {
            grep -E "FAIL|skip" /tmp/harness.log | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          }
