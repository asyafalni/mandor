name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig (pinned)
        run: |
          ZV=$(cat .zigversion)
          curl -sSL "https://ziglang.org/download/${ZV}/zig-x86_64-linux-${ZV}.tar.xz" | tar xJ
          echo "$PWD/zig-x86_64-linux-${ZV}" >> "$GITHUB_PATH"

      - name: Build static binaries
        run: |
          zig build -Dtarget=x86_64-linux-musl -Doptimize=ReleaseSafe -p zig-out/x64
          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSafe -p zig-out/a64
          mkdir -p dist/amd64 dist/arm64
          cp zig-out/x64/bin/mandor dist/amd64/mandor
          cp zig-out/a64/bin/mandor dist/arm64/mandor
          cp zig-out/x64/bin/mandor mandor-x86_64-linux
          cp zig-out/a64/bin/mandor mandor-aarch64-linux

      - name: GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mandor-x86_64-linux
            mandor-aarch64-linux
          generate_release_notes: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
